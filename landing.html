<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amitai Megged | The Reveal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700&family=Assistant:wght@200;300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --cursor-size: 250px;
            --text-light: #F8F6F0;
            --text-dark: #1A1A1A;
            --accent: #C4A052;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
            /* Custom cursor */
        }

        body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Assistant', sans-serif;
            background: #0a0a0a;
        }

        /* The Custom Cursor */
        .cursor-ring {
            position: fixed;
            top: 0;
            left: 0;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, border-color 0.3s;
            mix-blend-mode: difference;
        }

        .cursor-dot {
            position: fixed;
            top: 0;
            left: 0;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
        }

        /* Container for the layers */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Layer Styles */
        .layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center 20%;
            /* Adjusted to focus on face */
            transition: transform 0.1s ease-out;
            /* Parallax */
        }

        /* --- Warm Layer (Bottom) --- */
        .layer-warm {
            background-color: #E8E0D0;
            /* Sand fallback */
            z-index: 1;
        }

        .layer-warm .bg-image {
            background-image: url('https://megged.co.il/wp-content/uploads/2014/06/%D7%90%D7%A0%D7%95%D7%9B%D7%99.jpg');
            filter: sepia(0.2) contrast(1.1) brightness(1.1);
        }

        /* --- Intellectual Layer (Top) --- */
        .layer-intellectual {
            background-color: #1A1A1A;
            /* Dark fallback */
            z-index: 2;
            /* The mask will be applied via JS specifically to this layer */
        }

        .layer-intellectual .bg-image {
            background-image: url('https://ebook-pro.com/wp-content/uploads/2022/11/Amittai-Megged.jpg');
            filter: grayscale(1) contrast(1.2) brightness(0.8);
            /* Desaturated, moody */
        }

        /* Grid Effect (Only on Top Layer) */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            z-index: 1;
            pointer-events: none;
        }

        /* UI Content Overlay */
        .ui-content {
            position: absolute;
            inset: 0;
            z-index: 10;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Styles specific to layers for Dynamic Inversion */
        .layer-intellectual .ui-content {
            color: var(--text-light);
        }

        .layer-warm .ui-content {
            color: var(--text-dark);
        }

        .layer-warm .ui-content a {
            color: var(--text-dark);
            border-color: rgba(0, 0, 0, 0.2);
        }

        .layer-warm .ui-content .social-icon {
            fill: var(--text-dark);
        }

        /* Typography */
        .brand-name h1 {
            font-family: 'Frank Ruhl Libre', serif;
            font-size: 80px;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -2px;
            margin-bottom: 2rem;
        }

        .brand-name span {
            display: block;
        }

        .brand-title {
            font-family: 'Assistant', sans-serif;
            font-size: 16px;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-top: 20px;
            font-weight: 300;
        }

        .nav-link {
            position: absolute;
            top: 60px;
            right: 60px;
            /* English LTR for position, but site is RTL */
            left: 60px;
            /* Actually top-left in RTL if we don't force absolute */
        }

        /* Handling RTL positioning manually for "Top Right" request */
        /* Request: Top-Right = Navigation "Megged Center" */
        /* Request: Top-Left = Name "Amittai Megged" */

        /* Since dir=rtl:
           Top-Right is the "Start" in visual terms for English, but "End" for Hebrew?
           "Top-Left corner, place the name 'אמתי מגד'" -> This is flex-start in LTR, but flex-end in RTL?
           Let's use fixed positioning to be precise.
        */

        .top-left {
            position: absolute;
            top: 60px;
            left: 60px;
            text-align: left;
        }

        .top-right {
            position: absolute;
            top: 60px;
            right: 60px;
        }

        .bottom-right {
            position: absolute;
            bottom: 60px;
            right: 60px;
            display: flex;
            gap: 24px;
        }

        .cta-button {
            display: inline-block;
            text-decoration: none;
            color: inherit;
            font-family: 'Assistant', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 12px 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 100px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .layer-warm .cta-button:hover {
            background: #1A1A1A;
            color: white;
            border-color: #1A1A1A;
        }

        .layer-intellectual .cta-button:hover {
            background: white;
            color: #1A1A1A;
            border-color: white;
        }

        .social-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
            opacity: 0.7;
            transition: opacity 0.3s, transform 0.3s;
        }

        .social-icon:hover {
            opacity: 1;
            transform: translateY(-5px);
        }

        /* Mobile adjustment */
        @media (max-width: 768px) {
            .brand-name h1 {
                font-size: 50px;
            }

            .top-left {
                top: 30px;
                left: 30px;
            }

            .top-right {
                top: 30px;
                right: 30px;
            }

            .bottom-right {
                bottom: 30px;
                right: 30px;
            }

            .cursor-ring,
            .cursor-dot {
                display: none;
            }

            /* No custom cursor on touch */
            /* Force revealing on center tap or animation? 
               For now, let's keep it simple. */
        }
    </style>
</head>

    <script>
        const cursorRing = document.querySelector('.cursor-ring');
        const cursorDot = document.querySelector('.cursor-dot');
        const revealLayer = document.getElementById('revealLayer');
        const layers = document.querySelectorAll('.bg-image');
        let isMoving = false;

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            isMoving = true;

            // Move custom cursor
            cursorDot.style.left = mouseX + 'px';
            cursorDot.style.top = mouseY + 'px';

            // Allow ring to lag slightly for organic feel
            requestAnimationFrame(() => {
                cursorRing.style.left = mouseX + 'px';
                cursorRing.style.top = mouseY + 'px';
            });

            updateMask();
        });

        function updateMask() {
            // Update Mask
            const x = mouseX;
            const y = mouseY;

            // Mask gradient: Transparent at center (reveals bottom layer), Black at edges (shows top layer)
            const maskSize = 250; // Total diameter of reveal
            revealLayer.style.maskImage = `radial-gradient(circle at ${x}px ${y}px, transparent 100px, black ${maskSize}px)`;
            revealLayer.style.webkitMaskImage = `radial-gradient(circle at ${x}px ${y}px, transparent 100px, black ${maskSize}px)`;

            // Parallax Effect
            const moveX = (window.innerWidth / 2 - mouseX) * 0.015;
            const moveY = (window.innerHeight / 2 - mouseY) * 0.015;

            layers.forEach(layer => {
                layer.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.05)`;
            });

            if (isMoving) {
                requestAnimationFrame(updateMask);
                isMoving = false; // Only loop when moving to save battery
            }
        }

        // Initial call
        updateMask();


        // Hover effects for cursor
        const interactables = document.querySelectorAll('a');
        interactables.forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursorRing.style.width = '60px';
                cursorRing.style.height = '60px';
                cursorRing.style.borderWidth = '2px';
            });
            el.addEventListener('mouseleave', () => {
                cursorRing.style.width = '40px';
                cursorRing.style.height = '40px';
                cursorRing.style.borderWidth = '1px';
            });
        });

    </script>
